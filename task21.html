<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var electriclist=[];
            var waterlist=[];
           for(var counter=1; counter <4;counter++){
            var input=prompt('Insert pikachu name')
          if(input=='pikachu' | input=='raichu' | input=='elekid'){
            electriclist+=' - '+ input;
           }
          
           else if(input=='greninja'| input=='lapras' | input==
            'squirtle'
            ){
           waterlist+=' - '+ input;
           } 
          
        }
         console.log("Electric type pokemon:\n" + electriclist);
           console.log("Water type pokemon:\n" + waterlist);
           
        </script>
    </body>
</html>
