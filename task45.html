<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>

        <div id="soal"></div>
        <input id="jawab">
        <button onclick="cek()">Login</button>
        <div id="hasil"></div>

    </body>
    <script>
    let img = ["0.jpg","1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg"]

    let a = Math.floor(Math.random()*10)
    let b = Math.floor(Math.random()*10)
    let op = ["+","-"][Math.floor(Math.random()*2)]

    document.getElementById("soal").innerHTML =
    "<img src='"+img[a]+"' width=50>" +
    op +
    "<img src='"+img[b]+"' width=50>"

    function cek(){
        let user = document.getElementById("jawab").value
        let benar = op=="+" ? a+b : a-b

        if(user == benar){
            document.getElementById("hasil").innerHTML = "CAPTCHA is VALID!"
        }else{
            document.getElementById("hasil").innerHTML = "CAPTCHA is INVALID!"
        }
    }
    </script>
</html>
