<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <div class="w3-container">
            <img id="gmbr" class="w3-round-xlarge" style="width:100%" src="g1.jpg">
        </div>

        <button onclick="mundur()">Mundur</button>
        <button onclick="maju()">Maju</button>
    </body>
    <script>
    let gambar = ["g1.jpg","g2.jpg","g3.jpg"]
    let i = 0

    function maju(){
        i++
        if(i >= gambar.length){ i = 0 }
        document.getElementById("gmbr").src = gambar[i]
    }

    function mundur(){
        i--
        if(i < 0){ i = gambar.length - 1 }
        document.getElementById("gmbr").src = gambar[i]
    }
    </script>
</html>
