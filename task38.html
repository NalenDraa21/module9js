<!DOCTYPE html>
<html>
<head>
    <title>javascript</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        body { background-color: #f1f1f1; }
        .main-card { max-width: 600px; margin: 50px auto; padding: 20px; background: white; }
        .result-box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: #fafafa; display: none; }
    </style>
</head>
<body>

<div class="w3-container">
    <div class="w3-card-4 main-card w3-round">
        <h2 class="w3-center">Create Account</h2>
        
        <div class="w3-row-padding">
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="fname" type="text" placeholder="First Name"></p>
            </div>
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="lname" type="text" placeholder="Last Name"></p>
            </div>
        </div>

        <div class="w3-container">
            <p>
                <select class="w3-select w3-border w3-round" id="country">
                    <option value="" disabled selected>Choose your country</option>
                    <option value="Indonesia">Indonesia</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                </select>
            </p>
        </div>

        <div class="w3-row-padding">
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="email" type="email" placeholder="Email Address"></p>
            </div>
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="phone" type="text" placeholder="Phone Number"></p>
            </div>
        </div>

        <div class="w3-row-padding">
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="pass" type="password" placeholder="Password"></p>
            </div>
            <div class="w3-half">
                <p><input class="w3-input w3-border w3-round" id="confirm" type="password" placeholder="Confirm Password"></p>
            </div>
        </div>

        <div class="w3-container">
            <p><input class="w3-check" id="terms" type="checkbox"> <label>Terms and Condition</label></p>
            <p class="w3-center">
                <button class="w3-button w3-blue w3-round w3-block" onclick="createAccount()">Create</button>
            </p>
        </div>

        <div id="result" class="result-box"></div>
    </div>
</div>

<script>
function createAccount() {
    
    var fName = document.getElementById("fname").value;
    var lName = document.getElementById("lname").value;
    var country = document.getElementById("country").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var pass = document.getElementById("pass").value;
    var confirm = document.getElementById("confirm").value;
    var terms = document.getElementById("terms").checked;

    var resultDiv = document.getElementById("result");

    
    var passStatus = "";
    if (pass === confirm) {
        passStatus = "<b style='color:green;'>Password sama dengan Confirm Password</b>";
    } else {
        passStatus = "<b style='color:red;'>Password tidak sama dengan Confirm Password</b>";
    }

    
    if (fName == "" || lName == "" || pass == "") {
        alert("Mohon isi data yang penting!");
        return;
    }

    
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "<h3>Hasil Isian Form:</h3>" +
        "<p>Nama Lengkap: " + fName + " " + lName + "</p>" +
        "<p>Negara: " + country + "</p>" +
        "<p>Email: " + email + "</p>" +
        "<p>No. HP: " + phone + "</p>" +
        "<p>Syarat & Ketentuan: " + (terms ? "Disetujui" : "Tidak Disetujui") + "</p>" +
        "<hr>" +
        "<p>Keterangan Password: " + passStatus + "</p>";
}
</script>

</body>
</html>
