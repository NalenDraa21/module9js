<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <script type="text/javascript">
       var counter = 0;
var result = "";

while (counter < 10) {
    var random_value = Math.floor(Math.random() * 6) + 1;
    result += random_value + " ";
    counter++;
}

console.log("10 angka random: " + result);
    </script>
</html>
