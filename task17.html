<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <script type="text/javascript">
        var counter=0;
        var total=0;
        while(counter!=10){
           var input=prompt('Ini angka ke- '+ counter);
           total+= Number(input);
           counter++;
        }
        console.log('total 10 angka = ' + total);
    </script>
</html>
