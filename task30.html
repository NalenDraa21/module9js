<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var list=[];
            var buah=prompt('Masukkan nama buah (Ketik stop untuk berhenti)');
            while(buah!='stop'){
                list.push(buah);
                var buah=prompt('Masukkan nama buah (Ketik stop untuk berhenti)');
            }
            console.log(list);
        </script>
    </body>
</html>
