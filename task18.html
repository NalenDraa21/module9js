<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <script type="text/javascript">
        var counter=0;
        var total=0;
        while(input!=-1){
           var input=prompt('Angka ke- '+ counter);
           total+= Number(input);
           counter++;
        }
        console.log('total ' + counter + ' angka = ' + total);
    </script>
</html>
