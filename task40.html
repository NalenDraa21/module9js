<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javascript</title>
    </head>
    <body>
        <button onclick="changequotes()">Change Quotes</button>
        <p id="output"></p>
        <script type="text/javascript">
        var quotes=["Programmer: A machine that turns coffee into code.", "Computers are fast; programmers keep it slow.","When I wrote this code, only God and I understood what I did. Now only God knows.","How many programmers does it take to change a light bulb? None, that’s a hardware problem." ,"“Programming is like sex: One mistake and you have to support it for the rest of your life.", "Copy-and-Paste was programmed by programmers for programmers actually." ,"Always code as if the person who ends up maintaining your code will be a violent psychopath who knows where you live." ,"Algorithm: Word used by programmers when they don’t want to explain what they did.", "Software and cathedrals are much the same — first we build them, then we pray.",  "There are two ways to write error-free programs; only the third works.", "Remember that there is no code faster than no code." , "No code has zero defects." ,"One man’s crappy software is another man’s full-time job."]
        function changequotes(){
            var random=Math.floor(Math.random()*13);
            document.getElementById("output").innerHTML=quotes[random];
            console.log(random);
        }
        
    </script>
    </body>
</html>
